server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /auth/ {
        proxy_pass http://backend-service:8000/auth/;
    }

    location /register/ {
        proxy_pass http://backend-service:8000/register/;
    }

    location /foods {
        proxy_pass http://backend-service:8000/foods;
    }

    location /food-logs {
        proxy_pass http://backend-service:8000/food-logs;
    }

    location /nutrition-plans {
        proxy_pass http://backend-service:8000/nutrition-plans;
    }

    location /nutrition-optimizer {
        proxy_pass http://backend-service:8000/nutrition-optimizer;
    }

    location /nutrition-enhanced {
        proxy_pass http://backend-service:8000/nutrition-enhanced;
    }

    location /dashboard {
        proxy_pass http://backend-service:8000/dashboard;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
