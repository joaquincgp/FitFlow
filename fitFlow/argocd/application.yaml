apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fitflow
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/joaquincgp/FitFlow.git
    targetRevision: master
    path: fitFlow/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: fitflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true